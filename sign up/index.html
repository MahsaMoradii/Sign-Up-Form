<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="form-container">
      <h2 class="form-title">sign up form</h2>
      <form action="#" method="post">
        <label for="name">Full Name</label>
        <input
          type="text"
          name="fullname"
          id="name"
          class="input-box"
          placeholder="e.g Mahsa Alimoradian"
        />
        <label for="Email">Email Adress</label>
        <input
          type="email"
          name="Emailadress"
          id="Email"
          class="input-box"
          placeholder="You@gmail.com"
        />
        <label for="password">Password</label>
        <input
          type="password"
          name="password"
          id="password"
          class="input-box"
          placeholder="Choose a Strong Password"
        />
        <label for="bio">Short Bio</label>
        <textarea
          name="bio"
          id="bio"
          class="input-box textarea-box"
          placeholder="Tell us a bit about yourself..."
          rows="3"
        ></textarea>
        <label for="country">country</label>
        <select name="country" id="country" class="input-box">
          <option value="placeholder" selected disabled>
            select your country
          </option>
          <option value="Iran">Iran</option>
          <option value="Afghanestan">Afghanestan</option>
          <option value="Germany">Germany</option>
          <option value="usa">USA</option>
        </select>
        <label>Gender</label>
        <div class="gender-option">
          <label>
             <input type="radio" name="gender" value="Male" />Male</label>
          <label>
            <input type="radio" name="gender" value="Female" />Female</label>
          <label>
            <input type="radio" name="gender" value="Other" />Other</label>
        </div>
        <button type="submit" class="register-btn">Register</button>
      </form>
    </div>
  </body>
</html>
